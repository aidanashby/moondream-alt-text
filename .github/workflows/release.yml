name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          git archive --format=zip --prefix=moondream-alt-text/ HEAD \
            -o moondream-alt-text.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: moondream-alt-text.zip
          generate_release_notes: true
